PACKAGE_NAME="dkms_per_module_config_test"
PACKAGE_VERSION="1.0"

# Multiple modules with different per-module BUILD_EXCLUSIVE configurations
BUILT_MODULE_NAME[0]="dkms_per_module_config_test_mod1"
BUILT_MODULE_NAME[1]="dkms_per_module_config_test_mod2"
BUILT_MODULE_NAME[2]="dkms_per_module_config_test_mod3"

DEST_MODULE_LOCATION[0]="/updates/dkms"
DEST_MODULE_LOCATION[1]="/updates/dkms"
DEST_MODULE_LOCATION[2]="/updates/dkms"

# Per-module kernel version exclusions
# Module 0: exclude kernel versions starting with 99 (should never match)
BUILD_EXCLUSIVE_KERNEL[0]="^99\..*"
# Module 1: exclude all kernel versions (should always exclude)
BUILD_EXCLUSIVE_KERNEL[1]=".*"
# Module 2: no per-module restrictions

# Per-module architecture exclusions
# Module 0: no arch restrictions
# Module 1: exclude current architecture (should exclude)
BUILD_EXCLUSIVE_ARCH[1]="none"
# Module 2: no arch restrictions

AUTOINSTALL="yes"
