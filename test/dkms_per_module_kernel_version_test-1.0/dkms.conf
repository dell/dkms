PACKAGE_NAME="dkms_per_module_kernel_version_test"
PACKAGE_VERSION="1.0"

# Two modules with different kernel version requirements
BUILT_MODULE_NAME[0]="dkms_per_module_kernel_version_test_old"
BUILT_MODULE_NAME[1]="dkms_per_module_kernel_version_test_new"

DEST_MODULE_LOCATION[0]="/updates/dkms"
DEST_MODULE_LOCATION[1]="/updates/dkms"

# Per-module kernel version restrictions
# Module 0: only for kernels < 5.0 (should be excluded on modern kernels)
BUILD_EXCLUSIVE_KERNEL_MAX[0]="4.99"
# Module 1: only for kernels >= 5.0 (should be included on modern kernels)
BUILD_EXCLUSIVE_KERNEL_MIN[1]="5.0"

AUTOINSTALL="yes"
